<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zoom Trading Signal Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 24px;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .counters {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .counter-card {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 18px 20px;
      text-align: center;
    }

    .counter-card .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .counter-card .value {
      font-size: 2.2rem;
      font-weight: 700;
    }

    .counter-card.buy  { border-color: #238636; }
    .counter-card.buy .label  { color: #3fb950; }
    .counter-card.buy .value  { color: #3fb950; }

    .counter-card.sell { border-color: #da3633; }
    .counter-card.sell .label { color: #f85149; }
    .counter-card.sell .value { color: #f85149; }

    .counter-card.alert { border-color: #9e6a03; }
    .counter-card.alert .label { color: #d29922; }
    .counter-card.alert .value { color: #d29922; }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .event {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }

    .event.has-signal { border-color: #388bfd44; }

    .event-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .timestamp {
      font-size: 0.75rem;
      color: #8b949e;
      font-family: monospace;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .badge-BUY   { background: #238636; color: #aff6c8; }
    .badge-SELL  { background: #da3633; color: #ffc1c1; }
    .badge-ALERT { background: #9e6a03; color: #ffe69c; }

    .transcript {
      font-size: 0.85rem;
      color: #c9d1d9;
      line-height: 1.5;
    }

    .empty {
      text-align: center;
      color: #8b949e;
      padding: 40px;
      font-size: 0.9rem;
    }

    .last-updated {
      font-size: 0.75rem;
      color: #8b949e;
      margin-top: 16px;
      text-align: right;
    }
  </style>
</head>
<body>
  <h1><span class="status-dot"></span>Zoom Trading Signal Dashboard</h1>
  <p class="subtitle">Live signals from Zoom audio &mdash; refreshes every 3s</p>

  <div class="counters">
    <div class="counter-card buy">
      <div class="label">Buy</div>
      <div class="value" id="count-BUY">0</div>
    </div>
    <div class="counter-card sell">
      <div class="label">Sell</div>
      <div class="value" id="count-SELL">0</div>
    </div>
    <div class="counter-card alert">
      <div class="label">Alert</div>
      <div class="value" id="count-ALERT">0</div>
    </div>
  </div>

  <div class="section-title">Signal Feed</div>
  <div class="feed" id="feed">
    <div class="empty">Waiting for audio signals...</div>
  </div>

  <div class="last-updated" id="last-updated"></div>

  <script>
    async function fetchSignals() {
      try {
        const res = await fetch('/signals');
        const data = await res.json();

        document.getElementById('count-BUY').textContent   = data.counts.BUY   || 0;
        document.getElementById('count-SELL').textContent  = data.counts.SELL  || 0;
        document.getElementById('count-ALERT').textContent = data.counts.ALERT || 0;

        const feed = document.getElementById('feed');
        if (!data.events || data.events.length === 0) {
          feed.innerHTML = '<div class="empty">Waiting for audio signals...</div>';
        } else {
          feed.innerHTML = data.events.map(e => {
            const badges = (e.signals || []).map(s =>
              `<span class="badge badge-${s}">${s}</span>`
            ).join('');
            return `
              <div class="event ${e.signals && e.signals.length ? 'has-signal' : ''}">
                <div class="event-header">
                  <span class="timestamp">${e.timestamp}</span>
                  ${badges}
                </div>
                <div class="transcript">${e.transcript}</div>
              </div>`;
          }).join('');
        }

        if (data.last_updated) {
          document.getElementById('last-updated').textContent = `Last updated: ${data.last_updated}`;
        }
      } catch (err) {
        console.error('Failed to fetch signals:', err);
      }
    }

    fetchSignals();
    setInterval(fetchSignals, 3000);
  </script>
</body>
</html>
